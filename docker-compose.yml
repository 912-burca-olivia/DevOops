version: "3.8"

services:
  app:
    image: ${DOCKER_USERNAME}/devoops-app:latest
    container_name: minitwit_app
    ports:
      - "8080:8080"
    environment:
      ENDPOINT: "http://host.docker.internal:7070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

  api:
    image: ${DOCKER_USERNAME}/devoops-api:latest
    container_name: minitwit_api
    ports:
      - "7070:7070"
    volumes:
      - ./minitwit.db:/app/minitwit.db
    environment:
      DATABASE: "/app/minitwit.db"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s


  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command: --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"  # Change Prometheus port to 7070

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - 'grafana_storage:/var/lib/grafana'

volumes:
  grafana_storage: {}